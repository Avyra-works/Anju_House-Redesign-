<style>
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .text-shimmer {
            background: linear-gradient(
                90deg, 
                #e2e3df 0%, 
                #e5bfa3 25%, 
                #e2e3df 50%, 
                #e5bfa3 75%, 
                #e2e3df 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }

        .glow-overlay {
            background: radial-gradient(circle at center, rgba(229, 191, 163, 0.1) 0%, rgba(18, 20, 18, 0) 70%);
        }

        .reveal-up {
            opacity: 0;
            transform: translateY(20px);
            animation: revealUp 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes revealUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simulate assets loading transition
            const bgReveal = document.getElementById('bg-reveal');
            setTimeout(() => {
                if (bgReveal) {
                    bgReveal.classList.remove('opacity-20');
                    bgReveal.classList.add('opacity-40');
                }
            }, 500);

            // Determining "Active" status for future navigation if this were a shell
            // Since this is a loading screen, we are in a transactional state

        });
